<!DOCTYPE html>
<html>
<head>
<title>INGRES AI Chatbot</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>INGRES Virtual Assistant</h2>

<div id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask something about INGRES...">
<button onclick="sendMessage()">Send</button>
</div>

<p class="suggestions">
Try asking:
<br>
• What services does INGRES provide?
<br>
• I have a login problem
<br>
• How to register a complaint?
</p>

</div>

<script>

function sendMessage(){

let userText = document.getElementById("userInput").value;

if(userText === "") return;

let chatbox = document.getElementById("chatbox");

chatbox.innerHTML += "<div class='user'>You: "+userText+"</div>";

fetch("/get",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"msg="+encodeURIComponent(userText)
})

.then(res=>res.json())
.then(data=>{
chatbox.innerHTML += "<div class='bot'>Bot: "+data+"</div>";
chatbox.scrollTop = chatbox.scrollHeight;
});

document.getElementById("userInput").value="";
}

</script>

</body>
</html>
